<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamento de Salas - IFRS Campus Rolante</title>
  <link rel="stylesheet" href="/css/estilo.css">
</head>
<body>
  <header>
    <h1>Agendamento de Salas — IFRS Campus Rolante</h1>
    <div id="area-usuario">
      <span id="nome-usuario"></span>
      <button id="btn-logout" style="display:none">Sair</button>
    </div>
  </header>

  <!-- Tela de login (aparece quando ninguém está logado) -->
  <section id="tela-login">
    <h2>Entrar</h2>
    <input id="login-email" type="email" placeholder="Email">
    <input id="login-senha" type="password" placeholder="Senha">
    <button id="btn-login">Entrar</button>
    <p id="msg-login" class="msg"></p>
    <p><a href="#" id="link-cadastro">Não tem conta? Cadastre-se</a></p>
  </section>

  <!-- Tela de cadastro (criar novo usuário) -->
  <section id="tela-cadastro" style="display:none">
    <h2>Cadastrar</h2>
    <input id="cad-nome" type="text" placeholder="Nome">
    <input id="cad-email" type="email" placeholder="Email">
    <input id="cad-senha" type="password" placeholder="Senha">
    <button id="btn-cadastrar">Cadastrar</button>
    <p id="msg-cadastro" class="msg"></p>
    <p><a href="#" id="link-login">Já tem conta? Entrar</a></p>
  </section>

  <!-- Tela principal (planta + agendamento) -->
  <section id="tela-principal" style="display:none">
    <div id="planta-container">
      <div id="linha-planta">
        <!-- Aqui o Three.js desenha o modelo 3D exportado do Sweet Home 3D (public/modelo3d/).
             As bolinhas de cada sala são criadas e posicionadas via JS (planta3d.js). -->
        <div id="planta3d-container">
          <button id="btn-seta-cima" class="seta-navegacao" type="button" style="display:none" title="Sala acima">▲</button>
          <button id="btn-seta-baixo" class="seta-navegacao" type="button" style="display:none" title="Sala abaixo">▼</button>
          <button id="btn-seta-esquerda" class="seta-navegacao" type="button" style="display:none" title="Sala à esquerda">◀</button>
          <button id="btn-seta-direita" class="seta-navegacao" type="button" style="display:none" title="Sala à direita">▶</button>
        </div>

        <!-- RF10: slider lateral de andar — arraste a alça (ou clique no trilho) pra trocar -->
        <div id="slider-andar" aria-label="Arraste para trocar de andar">
          <!-- Volta a câmera pra vista padrão (térreo) -->
          <button id="btn-centralizar-padrao" type="button" title="Centralizar câmera (posição padrão)">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 2a1.5 1.5 0 0 1 1.5 1.5v1.55A7.51 7.51 0 0 1 19 10.5h1.5a1.5 1.5 0 0 1 0 3H19a7.51 7.51 0 0 1-5.5 5.45v1.55a1.5 1.5 0 0 1-3 0v-1.55A7.51 7.51 0 0 1 5 13.5H3.5a1.5 1.5 0 0 1 0-3H5a7.51 7.51 0 0 1 5.5-5.45V3.5A1.5 1.5 0 0 1 12 2Zm0 4.5A5.5 5.5 0 1 0 17.5 12 5.5 5.5 0 0 0 12 6.5Zm0 3A2.5 2.5 0 1 1 9.5 12 2.5 2.5 0 0 1 12 9.5Z"/>
            </svg>
          </button>
          <span class="slider-andar-rotulo">Superior</span>
          <div id="slider-andar-trilho">
            <div id="slider-andar-alca" class="no-terreo"></div>
          </div>
          <span class="slider-andar-rotulo">Térreo</span>
        </div>
      </div>
      <!-- Painel temporário usado só para identificar os nomes brutos dos cômodos no OBJ (ver MAPEAMENTO_MANUAL_SALAS em planta3d.js) -->
      <p id="debug-sala-clicada" style="font-family: monospace; color: #666;"></p>
      <!-- Botão temporário: navegue até a posição desejada e clique aqui pra ver as coordenadas da câmera -->
      <button id="btn-capturar-camera" type="button">Capturar posição da câmera</button>
    </div>

    <!-- Janela (modal) de reserva — abre depois que a câmera chega na sala escolhida -->
    <div id="overlay-reserva" style="display:none">
      <div id="painel-reserva">
        <button id="btn-fechar-reserva" type="button" title="Fechar">✕</button>
        <h2 id="titulo-sala"></h2>
        <label>Data: <input id="data" type="date"></label>
        <button id="btn-ver-horarios">Ver horários</button>

        <ul id="lista-horarios"></ul>

        <h3>Nova reserva</h3>
        <label>Início: <input id="hora-inicio" type="time"></label>
        <label>Fim: <input id="hora-fim" type="time"></label>
        <input id="finalidade" type="text" placeholder="Finalidade (opcional)">
        <button id="btn-reservar">Reservar</button>
        <p id="msg-reserva" class="msg"></p>
      </div>
    </div>
  </section>

  <!-- Three.js e os loaders/controles necessários para o modelo 3D (versão clássica, sem módulos) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="/js/planta3d.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
